<svg width="160" height="160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="fire-core" cx="50%" cy="60%" r="50%">
      <stop offset="0%" stop-color="#f1c40f"/>
      <stop offset="40%" stop-color="#e67e22"/>
      <stop offset="80%" stop-color="#c0392b"/>
      <stop offset="100%" stop-color="#111111" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow-heavy" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <rect width="160" height="160" rx="5" fill="#111"/>
  
  <!-- Fire background aura -->
  <circle cx="80" cy="80" r="55" fill="url(#fire-core)" filter="url(#glow-heavy)"/>
  
  <!-- Silhouette of Beast -->
  <path d="M 50,120 Q 30,80 70,40 Q 90,20 110,50 Q 130,80 110,120 Z" fill="#2c3e50" stroke="#f39c12" stroke-width="3"/>
  
  <!-- Glowing Eyes/Core -->
  <polygon points="75,60 95,60 85,80" fill="#ffffff" filter="url(#glow-heavy)"/>
  
  <!-- Sparks -->
  <circle cx="40" cy="40" r="3" fill="#f1c40f" filter="url(#glow-heavy)"/>
  <circle cx="120" cy="60" r="2" fill="#e67e22" filter="url(#glow-heavy)"/>
  <circle cx="50" cy="130" r="4" fill="#f1c40f" filter="url(#glow-heavy)"/>
  <circle cx="110" cy="30" r="2" fill="#ff4757" filter="url(#glow-heavy)"/>
</svg>
