<svg width="160" height="160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="flame-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <linearGradient id="bow-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f39c12"/>
      <stop offset="100%" stop-color="#c0392b"/>
    </linearGradient>
  </defs>
  
  <rect width="160" height="160" rx="5" fill="#050000"/>
  
  <!-- Flaming Horseshoe -->
  <path d="M 50,40 C 30,40 30,120 80,120 C 130,120 130,40 110,40" fill="none" stroke="#d35400" stroke-width="12" filter="url(#flame-glow)"/>
  <path d="M 50,40 C 30,40 30,120 80,120 C 130,120 130,40 110,40" fill="none" stroke="#f1c40f" stroke-width="4"/>
  
  <!-- Bow -->
  <path d="M 40,20 Q 130,80 40,140" fill="none" stroke="url(#bow-grad)" stroke-width="8" filter="url(#flame-glow)"/>
  <line x1="40" y1="20" x2="40" y2="140" stroke="#ecf0f1" stroke-width="2" opacity="0.6"/>
  
  <!-- Fire Arrow -->
  <line x1="10" y1="80" x2="140" y2="80" stroke="#f1c40f" stroke-width="4" filter="url(#flame-glow)"/>
  <!-- Arrowhead -->
  <polygon points="140,80 120,70 120,90" fill="#ffffff" filter="url(#flame-glow)"/>
  <!-- Feathers -->
  <polygon points="10,80 30,70 30,90" fill="#e74c3c"/>
</svg>
