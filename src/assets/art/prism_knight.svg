<svg width="160" height="160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="drop-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#000" flood-opacity="0.8"/>
    </filter>
    <linearGradient id="metal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7f8c8d"/>
      <stop offset="50%" stop-color="#bdc3c7"/>
      <stop offset="100%" stop-color="#2c3e50"/>
    </linearGradient>
  </defs>

  <!-- Dark Background -->
  <rect width="160" height="160" rx="5" fill="#111111"/>

  <!-- Crossed Swords -->
  <g stroke="#bdc3c7" stroke-width="5" stroke-linecap="round" filter="url(#drop-shadow)">
    <line x1="30" y1="30" x2="130" y2="130" />
    <line x1="130" y1="30" x2="30" y2="130" />
    <!-- Sword Hilts -->
    <circle cx="30" cy="30" r="7" fill="#f1c40f" stroke="none"/>
    <circle cx="130" cy="30" r="7" fill="#f1c40f" stroke="none"/>
  </g>

  <!-- Shield -->
  <path d="M 40,50 L 120,50 L 120,90 C 120,135 80,155 80,155 C 80,155 40,135 40,90 Z" fill="url(#metal)" stroke="#34495e" stroke-width="4" filter="url(#drop-shadow)"/>

  <!-- Multi-faceted Prism Crystal -->
  <g filter="url(#glow)">
    <!-- Top facet -->
    <polygon points="80,55 105,80 80,95 55,80" fill="#00ffff" opacity="0.9"/>
    <!-- Left facet -->
    <polygon points="80,95 55,80 80,125" fill="#ff00ff" opacity="0.8"/>
    <!-- Right facet -->
    <polygon points="80,95 105,80 80,125" fill="#00a8ff" opacity="0.9"/>
    <!-- Center highlight -->
    <polygon points="80,70 90,80 80,85 70,80" fill="#ffffff" opacity="0.9"/>
  </g>
</svg>
