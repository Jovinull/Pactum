<svg width="200" height="300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Dark Fantasy Gold Border -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#bf953f" />
      <stop offset="25%" stop-color="#fcf6ba" />
      <stop offset="50%" stop-color="#b38728" />
      <stop offset="75%" stop-color="#fbf5b7" />
      <stop offset="100%" stop-color="#aa771c" />
    </linearGradient>
    
    <!-- Outer Drop Shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000" flood-opacity="0.9"/>
    </filter>
  </defs>

  <!-- Base Dark Card -->
  <rect width="200" height="300" rx="15" fill="#1c1c1c" stroke="url(#gold)" stroke-width="6" filter="url(#shadow)"/>
  
  <!-- Inner Texture/Glow -->
  <rect x="6" y="6" width="188" height="288" rx="12" fill="#2a2a2a" stroke="#000" stroke-width="2"/>

  <!-- Art Box Area -->
  <rect x="20" y="20" width="160" height="160" rx="5" fill="#050505" stroke="url(#gold)" stroke-width="3" filter="url(#shadow)"/>

  <!-- Text Area Background (Semi-transparent) -->
  <rect x="15" y="195" width="170" height="90" rx="8" fill="rgba(0,0,0,0.6)" stroke="#444" stroke-width="1.5"/>
</svg>
